[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
edition = "2024"
license = "MIT"
repository = "https://github.com/ahonn/orpc-rs"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
erased-serde = "0.4"
futures-core = "0.3"
thiserror = "2"
pin-project-lite = "0.2"
tokio = { version = "1", features = ["rt", "macros"] }
futures-util = "0.3"
orpc-procedure = { path = "crates/orpc-procedure" }
