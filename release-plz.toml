[workspace]
git_release_enable = true
changelog_update = true
git_tag_enable = true
git_tag_name = "v{{ version }}"

# tauri-plugin-orpc follows main crate release (no separate tags)
[[package]]
name = "tauri-plugin-orpc"
git_tag_enable = false
git_release_enable = false

# Example crates are not published
[[package]]
name = "example-axum-react"
publish = false
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "tauri-app"
publish = false
git_tag_enable = false
git_release_enable = false
changelog_update = false

[changelog]
header = """
# Changelog
All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/ahonn/orpc-rs/commit/{{ commit.id }}))
    {%- endfor %}
{% endfor %}\n
"""
trim = true
