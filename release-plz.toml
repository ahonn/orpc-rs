[workspace]
# Defaults: all crates publish to crates.io, but no individual tags/releases.
# Only the main `orpc` crate creates git tags and GitHub releases.
git_release_enable = false
git_tag_enable = false
changelog_update = true
publish_timeout = "30m"

# --- Core crates (version-locked via version_group) ---

# Main crate: owns the git tag, GitHub release, and root CHANGELOG.
[[package]]
name = "orpc"
git_tag_enable = true
git_tag_name = "v{{ version }}"
git_release_enable = true
changelog_path = "./CHANGELOG.md"
changelog_include = [
    "orpc-procedure",
    "orpc-macros",
    "orpc-client",
    "orpc-server",
    "orpc-axum",
    "orpc-specta",
    "tauri-plugin-orpc",
]
version_group = "orpc"

[[package]]
name = "orpc-procedure"
version_group = "orpc"
changelog_update = false

[[package]]
name = "orpc-macros"
version_group = "orpc"
changelog_update = false

[[package]]
name = "orpc-client"
version_group = "orpc"
changelog_update = false

[[package]]
name = "orpc-server"
version_group = "orpc"
changelog_update = false

[[package]]
name = "orpc-axum"
version_group = "orpc"
changelog_update = false

[[package]]
name = "orpc-specta"
version_group = "orpc"
changelog_update = false

[[package]]
name = "tauri-plugin-orpc"
version_group = "orpc"
changelog_update = false

# --- Example crates (not published) ---

[[package]]
name = "example-axum-react"
publish = false
release = false
changelog_update = false

[[package]]
name = "tauri-app"
publish = false
release = false
changelog_update = false

# --- Changelog format ---

[changelog]
header = """
# Changelog
All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/ahonn/orpc-rs/commit/{{ commit.id }}))
    {%- endfor %}
{% endfor %}\n
"""
trim = true
